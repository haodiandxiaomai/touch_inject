name: Build touch_inject.ko

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ANDROID_VERSION: "android14"
      KERNEL_VERSION: "6.1"

    steps:
      - name: Checkout touch_inject
        uses: actions/checkout@v4
        with:
          path: touch_inject

      - name: 清理磁盘空间
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 安装依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves bc clang lld
          execute_install_scripts: true

      - name: 下载 repo 工具
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "~/bin" >> $GITHUB_PATH

      - name: 下载工具链
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      - name: 配置 ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --max-size=2G
          ccache --set-config=compression=true

      - name: 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: a14-6.1-latest-ccache-v5
          restore-keys: |
            a14-6.1-latest-ccache-

      - name: 配置 Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "build@ci.local"

      - name: 同步内核源码
        run: |
          FORMATTED_BRANCH="${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$FORMATTED_BRANCH"
          mkdir -p "$KERNEL_ROOT"
          cd "$KERNEL_ROOT"
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH} 2>/dev/null || true)
          if grep -q deprecated <<< "$REMOTE_BRANCH" 2>/dev/null; then
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" .repo/manifests/default.xml
          fi
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)
          echo "KERNEL_ROOT=$KERNEL_ROOT" >> $GITHUB_ENV

      - name: 克隆补丁仓库
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/ShirkNeko/susfs4ksu.git -b gki-android14-6.1 2>/dev/null || \
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-6.1 2>/dev/null || true
          git clone https://github.com/ShirkNeko/SukiSU_patch.git 2>/dev/null || \
          git clone https://github.com/SukiSU/SukiSU_patch.git 2>/dev/null || true

      - name: 应用补丁
        run: |
          cd $KERNEL_ROOT
          DEFCONFIG=common/arch/arm64/configs/gki_defconfig
          cp "$DEFCONFIG" "${DEFCONFIG}.orig"
          if [ -d "$GITHUB_WORKSPACE/susfs4ksu" ]; then
            for p in $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/50*.patch; do
              [ -f "$p" ] && (patch -p1 --forward < "$p" || true)
            done
          fi
          if [ -d "$GITHUB_WORKSPACE/SukiSU_patch" ]; then
            for p in $GITHUB_WORKSPACE/SukiSU_patch/6.1/*.patch; do
              [ -f "$p" ] && (patch -p1 --forward < "$p" || true)
            done
          fi
          sed -i 's/-dirty//' common/scripts/setlocalversion 2>/dev/null || true
          sed -i '/protected_exports_list.*android\/abi_gki_protected_exports_aarch64/d' common/BUILD.bazel 2>/dev/null || true
          sed -i '/kmi_symbol_list_strict_mode/d' common/BUILD.bazel 2>/dev/null || true
          rm -f common/android/abi_gki_protected_exports_*
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true

      - name: 构建内核 (Bazel)
        run: |
          cd $KERNEL_ROOT
          sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' common/build.config.gki.aarch64 2>/dev/null || true
          sed -i '/MODULES_ORDER=android\/gki_aarch64_modules/d' common/build.config.gki.aarch64 2>/dev/null || true
          sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' common/build.config.gki.aarch64 2>/dev/null || true

          DEFCONFIG=common/arch/arm64/configs/gki_defconfig
          FRAG="common/arch/arm64/configs/ksu.fragment"
          diff "${DEFCONFIG}.orig" "$DEFCONFIG" | grep '^>' | sed 's/^> //; s/^[[:space:]]*//' > "$FRAG" || true
          cp "${DEFCONFIG}.orig" "$DEFCONFIG"

          tools/bazel build --disk_cache=$HOME/.cache/bazel --config=fast //common:kernel_aarch64_dist || exit 1

          echo "=== 内核版本 ==="
          strings bazel-bin/common/kernel_aarch64/Image | grep 'Linux version' | head -1

      - name: 编译 touch_inject.ko
        run: |
          cd $KERNEL_ROOT
          BAZEL_OUT="$KERNEL_ROOT/bazel-bin/common/kernel_aarch64"

          echo "=== 1. 解压内核头文件 ==="
          mkdir -p /tmp/kheaders
          tar xzf $BAZEL_OUT/out-dir-kernel-headers.tar.gz -C /tmp/kheaders/

          echo "=== 2. 设置 Make 基础设施 ==="
          # 生成 .config
          cd common
          make ARCH=arm64 gki_defconfig

          # 用 bazel 的 autoconf.h 覆盖（包含完整配置）
          if [ -f /tmp/kheaders/include/generated/autoconf.h ]; then
            mkdir -p include/generated
            cp /tmp/kheaders/include/generated/autoconf.h include/generated/autoconf.h
            echo "Copied autoconf.h from bazel output"
          fi

          # 复制 bazel 的 Module.symvers
          if [ -f $BAZEL_OUT/kernel_aarch64_Module.symvers ]; then
            cp $BAZEL_OUT/kernel_aarch64_Module.symvers Module.symvers
            echo "Copied Module.symvers from bazel output"
          fi

          # 生成 auto.conf 和其他必要文件
          # 关键: CC=clang (匹配 bazel), HOSTCC=gcc (编译 host 工具)
          echo "=== 3. make modules_prepare ==="
          make ARCH=arm64 CC=clang HOSTCC=gcc HOSTCFLAGS= modules_prepare 2>&1 | tail -10

          echo "=== 4. 验证构建基础设施 ==="
          ls -la include/config/auto.conf 2>/dev/null && echo "auto.conf OK" || echo "auto.conf MISSING"
          ls -la include/generated/autoconf.h 2>/dev/null && echo "autoconf.h OK" || echo "autoconf.h MISSING"
          ls -la Module.symvers 2>/dev/null && echo "Module.symvers OK" || echo "Module.symvers MISSING"

          echo "=== 5. 编译模块 ==="
          make ARCH=arm64 CC=clang \
            M=$GITHUB_WORKSPACE/touch_inject \
            modules 2>&1

          echo "=== 6. 验证 ==="
          if [ -f "$GITHUB_WORKSPACE/touch_inject/touch_inject.ko" ]; then
            echo "=== 编译成功 ==="
            file $GITHUB_WORKSPACE/touch_inject/touch_inject.ko
            echo "=== vermagic ==="
            strings $GITHUB_WORKSPACE/touch_inject/touch_inject.ko | grep vermagic
          else
            echo "=== 编译失败 ==="
            exit 1
          fi

      - name: 上传 touch_inject.ko
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: touch_inject-ko
          path: touch_inject/touch_inject.ko
          retention-days: 30
